# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# This workflow is triggered on pushes to the main branch and can also be triggered manually.
name: Build and deploy Node.js app to Azure Web App - iso-pro

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js version
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'
          package-manager-cache: false

      - name: npm install, generate Prisma client, build, and test
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          npm install
          npm run db:generate
          npm run build
          pwd
          ls -la
          if [ -d ".next" ]; then
            echo ".next exists"
            find . -maxdepth 3 | sort
          else
            echo ".next directory not found after build."
            exit 1
          fi
          if [ -f ".next/standalone/server.js" ]; then
            echo "standalone server entry exists"
          else
            echo "standalone server entry not found at .next/standalone/server.js"
            exit 1
          fi
          # Copy top-level static assets into the standalone .next folder so
          # the standalone server can serve CSS and other _next/static files.
          if [ -d ".next/static" ]; then
            echo "Copying .next/static into .next/standalone/.next/"
            mkdir -p .next/standalone/.next
            cp -R .next/static .next/standalone/.next/
          else
            echo "Warning: .next/static not found; CSS may be missing in standalone build"
          fi
          npm run test --if-present

      - name: Package artifact for deployment job
        run: |
          rm -f node-app.tar.gz
          tar -czf node-app.tar.gz .next package.json package-lock.json next.config.ts next-env.d.ts public
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v6
        with:
          name: node-app
          path: node-app.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: node-app

      - name: Inspect downloaded artifact layout
        run: |
          ls -la node-app
          find node-app -maxdepth 3 -mindepth 1 | sort

      - name: Extract artifact tarball
        run: |
          cd node-app
          tar -xzf node-app.tar.gz
          rm node-app.tar.gz
          ls -la
          find . -maxdepth 2 -mindepth 1 | sort

      - name: Set up Node.js for deploy packaging
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'

      - name: Install production dependencies for deploy
        run: |
          cd node-app
          npm ci --omit=dev

      - name: Verify Next production build exists
        run: |
          cd node-app
          if [ ! -d ".next" ]; then
            echo ".next directory not found. Build may have failed or artifact path is wrong."
            exit 1
          fi
          if [ ! -f ".next/standalone/server.js" ]; then
            echo ".next/standalone/server.js not found. Standalone output may be missing."
            exit 1
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_AA9A865845774FE0A0C69A7F379F0925 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_06EA98C756DE4B049273EC852D6FABC5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E6EF8159DABC44E085A27DA7B62D8A51 }}
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'iso-pro'
          slot-name: 'Production'
          package: ./node-app
